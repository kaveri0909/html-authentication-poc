<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User dashboard - welcome and account overview">
    <title>Dashboard - Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Custom styles -->
    <link href="styles.css" rel="stylesheet" />
</head>
<body class="min-vh-100">
  <a href="#main-content" class="sr-only sr-only-focusable">Skip to main content</a>

  <nav class="navbar navbar-expand-lg navbar-dark site-navbar w-100">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">AuthUI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">Sign Out</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main id="main-content" class="container py-5" role="main">
        <div class="container">
            <header class="header">
                <span class="success-icon" aria-hidden="true">✅</span>
                <h1>Welcome Back!</h1>
                <p class="welcome-message">You're successfully logged in to your account</p>
            </header>

            <section class="content" aria-labelledby="dashboard-content">
                <h2 id="dashboard-content" class="sr-only">Dashboard Content</h2>

                <div class="user-info">
                    <div class="user-name">John Doe</div>
                    <div class="user-email">john.doe@example.com</div>
                </div>

                <section class="stats" aria-labelledby="stats-heading">
                    <h3 id="stats-heading" class="sr-only">Account Statistics</h3>
                    <div class="stat-card">
                        <span class="stat-number">42</span>
                        <span class="stat-label">Projects</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">128</span>
                        <span class="stat-label">Tasks</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">89%</span>
                        <span class="stat-label">Complete</span>
                    </div>
                </section>

                <section class="quick-actions" aria-labelledby="actions-heading">
                    <h3 id="actions-heading">Quick Actions</h3>
                    <div class="action-grid">
                        <a href="#" class="action-card" aria-label="Create new project">
                            <span class="action-icon">📁</span>
                            <span class="action-title">New Project</span>
                        </a>
                        <a href="#" class="action-card" aria-label="View all tasks">
                            <span class="action-icon">📋</span>
                            <span class="action-title">View Tasks</span>
                        </a>
                        <a href="#" class="action-card" aria-label="Access settings">
                            <span class="action-icon">⚙️</span>
                            <span class="action-title">Settings</span>
                        </a>
                        <a href="#" class="action-card" aria-label="View reports">
                            <span class="action-icon">📊</span>
                            <span class="action-title">Reports</span>
                        </a>
                    </div>
                </section>

                <nav class="footer-actions" aria-label="Account actions">
                    <button class="btn btn-secondary" onclick="window.print()" aria-label="Print dashboard">
                        📄 Print Dashboard
                    </button>
                    <a href="login.html" class="btn" aria-label="Sign out of account">
                        🚪 Logout
                    </a>
                </nav>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Enhanced accessibility and UX features
        document.addEventListener('DOMContentLoaded', function() {
            // Add keyboard navigation for action cards
            const actionCards = document.querySelectorAll('.action-card');
            actionCards.forEach(card => {
                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        // In a real app, this would navigate to the respective page
                        alert('This would navigate to: ' + this.querySelector('.action-title').textContent);
                    }
                });
            });

            // Add dynamic content updates (simulated)
            function updateStats() {
                // In a real app, this would fetch data from an API
                const stats = document.querySelectorAll('.stat-number');
                stats.forEach(stat => {
                    const currentValue = parseInt(stat.textContent);
                    const newValue = currentValue + Math.floor(Math.random() * 3) - 1; // -1, 0, or +1
                    if (newValue >= 0) {
                        stat.textContent = newValue;
                    }
                });
            }

            // Update stats every 30 seconds (simulated real-time updates)
            setInterval(updateStats, 30000);

            // Add loading states for actions
            actionCards.forEach(card => {
                card.addEventListener('click', function(e) {
                    e.preventDefault();
                    const title = this.querySelector('.action-title');
                    const originalText = title.textContent;
                    title.textContent = 'Loading...';

                    // Simulate loading
                    setTimeout(() => {
                        title.textContent = originalText;
                        alert('Feature coming soon! This would navigate to ' + originalText.toLowerCase());
                    }, 1000);
                });
            });

            // Enhanced focus management
            const focusableElements = document.querySelectorAll('button, a[href], input, select, textarea');
            focusableElements.forEach(element => {
                element.addEventListener('focus', function() {
                    this.style.outline = '2px solid var(--primary-color)';
                    this.style.outlineOffset = '2px';
                });

                element.addEventListener('blur', function() {
                    this.style.outline = '';
                    this.style.outlineOffset = '';
                });
            });
        });
    </script>
</body>
</html>
