<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure login page for user authentication">
    <title>Login - Secure Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">    <a href="#main-content" class="sr-only sr-only-focusable">Skip to main content</a>

    <main id="main-content" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card auth-card">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <div class="fs-1 mb-2">🔐</div>
                            <h1 class="h4 mb-1">Welcome Back</h1>
                            <p class="text-muted mb-0">Sign in to your account</p>
                        </div>

                        <form id="login-form" action="#" method="post" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    name="email"
                                    placeholder="you@example.com"
                                    required
                                    autocomplete="email"
                                    aria-describedby="email-help"
                                >
                                <div id="email-help" class="form-text">Enter the email associated with your account.</div>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    name="password"
                                    placeholder="••••••••"
                                    required
                                    autocomplete="current-password"
                                    aria-describedby="password-help"
                                >
                                <div id="password-help" class="form-text">Enter your account password.</div>
                            </div>

                            <button type="submit" class="btn btn-brand btn-lg w-100" aria-describedby="login-status">
                                <span class="btn-text">Sign In</span>
                            </button>
                            <div id="login-status" class="form-text text-center text-muted mt-2" aria-live="polite" aria-atomic="true"></div>
                        </form>

                        <div class="d-flex align-items-center my-3">
                            <span class="w-100 border-top"></span>
                            <span class="px-3 text-muted">or</span>
                            <span class="w-100 border-top"></span>
                        </div>

                        <div class="d-grid gap-2">
                            <a href="register.html" class="btn btn-outline-brand btn-sm">
                                <i class="bi bi-person-plus me-1"></i>
                                Create Account
                            </a>
                            <a href="forgot-password.html" class="btn btn-outline-brand btn-sm">
                                <i class="bi bi-key me-1"></i>
                                Forgot Password?
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Enhanced accessibility and UX features
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('login-form');
            const submitBtn = form.querySelector('.btn');
            const statusDiv = document.getElementById('login-status');

            // Form validation and submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const email = document.getElementById('email');
                const password = document.getElementById('password');

                // Basic validation
                if (!email.value || !password.value) {
                    statusDiv.textContent = 'Please fill in all required fields.';
                    email.focus();
                    return;
                }

                if (!isValidEmail(email.value)) {
                    statusDiv.textContent = 'Please enter a valid email address.';
                    email.focus();
                    return;
                }

                // Simulate loading state
                submitBtn.classList.add('loading');
                submitBtn.querySelector('.btn-text').textContent = 'Signing in...';
                statusDiv.textContent = 'Signing you in...';

                // Simulate API call
                setTimeout(() => {
                    submitBtn.classList.remove('loading');
                    submitBtn.querySelector('.btn-text').textContent = 'Sign In';
                    statusDiv.textContent = 'Login successful! Redirecting...';

                    // Simulate redirect
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }, 2000);
            });

            // Email validation helper
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // Enhanced focus management
            const inputs = form.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('blur', function() {
                    if (this.value) {
                        this.setAttribute('aria-invalid', 'false');
                    }
                });
            });

            // Keyboard navigation enhancement
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && document.activeElement === form) {
                    form.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
