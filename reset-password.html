<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons (Optional) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="container d-flex justify-content-center align-items-center auth-container">
    <div class="card p-4 col-md-4">
        <h3 class="text-center mb-3">Reset Password</h3>

        <form id="resetForm">
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="New Password" required>
            </div>

            <div class="mb-3">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
            </div>

            <div class="form-check mb-3">
                <input type="checkbox" class="form-check-input" id="showPass" onchange="togglePassword()">
                <label class="form-check-label">Show Password</label>
            </div>

            <button type="submit" class="btn btn-custom w-100">Update Password</button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    let pass = document.getElementById("password");
    let confirm = document.getElementById("confirmPassword");
    let checkbox = document.getElementById("showPass");

    if (checkbox.checked) {
        pass.type = "text";
        confirm.type = "text";
    } else {
        pass.type = "password";
        confirm.type = "password";
    }
}

document.getElementById('resetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const resetEmail = localStorage.getItem('resetEmail');
    
    if (!resetEmail) {
        alert('Please go through forgot password page first.');
        window.location.href = 'forgot-password.html';
        return;
    }
    
    if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
    }
    
    if (password.length < 6) {
        alert('Password must be at least 6 characters long!');
        return;
    }
    
    // Get users and update password
    const users = JSON.parse(localStorage.getItem('users')) || [];
    const userIndex = users.findIndex(u => u.email === resetEmail);
    
    if (userIndex !== -1) {
        users[userIndex].password = password;
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.removeItem('resetEmail');
        
        alert('Password updated successfully! Redirecting to login...');
        window.location.href = 'login.html';
    }
});
</script>
<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
