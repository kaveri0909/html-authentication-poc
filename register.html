<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons (Optional) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="container d-flex justify-content-center align-items-center auth-container">
    <div class="card p-4 col-md-5">
        <h3 class="text-center mb-3">Register</h3>

        <form id="registerForm">
            <div class="mb-3">
                <input type="text" id="fullName" class="form-control" placeholder="Full Name" required>
            </div>

            <div class="mb-3">
                <input type="email" id="registerEmail" class="form-control" placeholder="Email" required>
            </div>

            <div class="mb-3">
                <input type="password" id="registerPassword" class="form-control" placeholder="Password" required>
            </div>

            <div class="mb-3">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="btn btn-custom w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>
<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    // Validate passwords match
    if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
    }
    
    // Get existing users
    const users = JSON.parse(localStorage.getItem('users')) || [];
    
    // Check if email already exists
    if (users.find(u => u.email === email)) {
        alert('Email already registered!');
        return;
    }
    
    // Add new user
    users.push({name: fullName, email: email, password: password});
    localStorage.setItem('users', JSON.stringify(users));
    
    // Show success message
    alert('Account created successfully! Redirecting to login page.');
    window.location.href = 'login.html';
});
</script>

</body>
</html>
