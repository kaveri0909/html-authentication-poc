<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons (Optional) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>
<body>
<div class="container d-flex justify-content-center align-items-center auth-container">
    <div class="card p-4 col-md-4">
        <h3 class="text-center mb-3">Forgot Password</h3>

        <form id="forgotForm">
            <div class="mb-3">
                <input type="email" id="resetEmail" class="form-control" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="btn btn-custom w-100">Send Reset Link</button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>
<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('resetEmail').value;
    
    // Get registered users
    const users = JSON.parse(localStorage.getItem('users')) || [];
    const user = users.find(u => u.email === email);
    
    if (user) {
        // Store email for password reset
        localStorage.setItem('resetEmail', email);
        alert('Reset link sent to your email! Redirecting to reset password page...');
        window.location.href = 'reset-password.html';
    } else {
        alert('Email not found. Please register first.');
    }
});
</script>

</body>
</html>
